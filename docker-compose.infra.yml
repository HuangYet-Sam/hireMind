# HireMind HR Backend Infrastructure Services
# Usage: docker compose -f docker-compose.infra.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hiremind-postgres
    environment:
      POSTGRES_DB: hiremind
      POSTGRES_USER: hiremind
      POSTGRES_PASSWORD: hiremind_dev
    ports:
      - "5432:5432"
    volumes:
      - hiremind-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiremind"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hiremind-redis
    ports:
      - "6379:6379"
    volumes:
      - hiremind-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hiremind-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hiremind-miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  hr-api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: hiremind-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://hiremind:hiremind_dev@postgres:5432/hiremind
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - CORS_ORIGINS=["http://localhost:8648","http://localhost:5173"]
    volumes:
      - ./packages/api/uploads:/app/uploads
    restart: unless-stopped

volumes:
  hiremind-pgdata:
  hiremind-redisdata:
  hiremind-miniodata:
