# ── HireMind Production Docker Compose ────────────────────────
# Usage:
#   1. cp .env.production.example .env.production
#   2. Edit .env.production with real values
#   3. docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Stop infra first if running:
#   docker compose -f docker-compose.infra.yml down
# ──────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hiremind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - hiremind-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiremind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hiremind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hiremind-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # ── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: hiremind-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hiremind-miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # ── FastAPI Backend ────────────────────────────────────────
  hr-api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: hiremind-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-hiremind}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      - MINIO_BUCKET_RESUMES=${MINIO_BUCKET_RESUMES:-resumes}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - "CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}"
    volumes:
      - hiremind-uploads:/app/uploads
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Running database migrations..."
        alembic upgrade head
        echo "Starting uvicorn..."
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - backend
      - frontend

  # ── Frontend (Nginx) ──────────────────────────────────────
  hr-frontend:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: hiremind-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      hr-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend

# ── Named Volumes ────────────────────────────────────────────
volumes:
  hiremind-pgdata:
    name: hiremind-pgdata
  hiremind-redisdata:
    name: hiremind-redisdata
  hiremind-miniodata:
    name: hiremind-miniodata
  hiremind-uploads:
    name: hiremind-uploads

# ── Networks ─────────────────────────────────────────────────
networks:
  backend:
    name: hiremind-backend
    driver: bridge
    internal: true    # No external access — only services on this network can communicate
  frontend:
    name: hiremind-frontend
    driver: bridge    # Exposed to host — hr-api and hr-frontend publish ports here
