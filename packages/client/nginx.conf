# ── HireMind Frontend Nginx Configuration ─────────────────────

upstream hr_api {
    server hr-api:8000;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host:443$request_uri;
}

# ── HTTPS server ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://172.20.42.100:8081 http://172.20.42.100:8081 https://172.20.42.100:8000 http://172.20.42.100:8000;" always;

    # ── CORS + Private Network Access ─────────────────────────
    # Handle PNA preflight (OPTIONS) requests
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Id, X-API-Key" always;
            add_header Access-Control-Allow-Private-Network "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # API Reverse Proxy
        proxy_pass http://hr_api;
        proxy_redirect http://172.20.42.100/ http://172.20.42.100:8081/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for actual responses
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Private-Network "true" always;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Static Assets (long cache) ────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health endpoint ───────────────────────────────────────
    location /health {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Private-Network "true" always;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Deny hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
