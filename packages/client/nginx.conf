# ── HireMind Frontend Nginx Configuration ─────────────────────

upstream hr_api {
    server hr-api:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ── CORS + Private Network Access (for LAN) ───────────────
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Private-Network "true" always;

    # ── API Reverse Proxy ─────────────────────────────────────
    location /api/ {
        # Handle PNA preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Id, X-API-Key" always;
            add_header Access-Control-Allow-Private-Network "true" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://hr_api;
        proxy_redirect http://172.20.42.100/ http://172.20.42.100:8081/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Health endpoint ───────────────────────────────────────
    location /health {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Private-Network "true" always;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # ── Static Assets (long cache) ────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
